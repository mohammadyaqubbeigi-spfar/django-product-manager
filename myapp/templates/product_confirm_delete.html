<!DOCTYPE html>
<html>

<head>
    <title>حذف محصول</title>
    <style>
        body {
            font-family: Arial;
            direction: rtl;
            text-align: center;
        }

        button {
            padding: 10px 20px;
            margin: 10px;
        }

        .delete {
            background-color: red;
            color: white;
            border: none;
            cursor: pointer;
        }

        .cancel {
            background-color: gray;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <h2>آیا از حذف محصول"{{ product.name }}" مطمئن هستید؟</h2>
    <form method="POST" style="display:inline;">
        {% csrf_token %}
        <button type="submit" class="delete">بله, حذف کن</button>
    </form>
    <a href="{% url 'product_list' %}"><button class="cancel">انصراف</button></a>
</body>

</html>
